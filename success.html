<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful — Placement Tracker</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/success.css">
</head>
<body>

<div class="success-wrapper">
    <div class="success-card">

        <div class="tick-circle">
            <svg viewBox="0 0 52 52" class="tick-svg">
                <circle class="tick-circle-bg" cx="26" cy="26" r="25" fill="none"/>
                <path class="tick-check" fill="none" d="M14 27 l8 8 l16 -16"/>
            </svg>
        </div>

        <h1>You're all set!</h1>
        <p>Your account has been created successfully.<br>
           Start your placement journey now.</p>

        <div class="success-points">
            <div class="point-item">
                <span class="point-icon">+</span>
                <span>Account created successfully</span>
            </div>
            <div class="point-item">
                <span class="point-icon">+</span>
                <span>10 XP bonus added to your account</span>
            </div>
            <div class="point-item">
                <span class="point-icon">+</span>
                <span>Ready to track your journey</span>
            </div>
        </div>

        <a href="jsp/login.jsp" class="btn-goto">Go to Login</a>

        <p class="auto-redirect">
            Redirecting in <span id="countdown">5</span> seconds...
        </p>

    </div>
</div>

<script src="js/success.js"></script>
</body>
</html>
